name: Build and release DownloadPilot

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v"
        required: true
        default: "0.2.3"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build release package
        shell: pwsh
        run: |
          .\scripts\build-release.ps1 -Configuration Release -Version "${{ steps.version.outputs.value }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DownloadPilot-v${{ steps.version.outputs.value }}-win-x64
          path: artifacts/release/v${{ steps.version.outputs.value }}/DownloadPilot-v${{ steps.version.outputs.value }}-win-x64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release/v${{ steps.version.outputs.value }}/DownloadPilot-v${{ steps.version.outputs.value }}-win-x64.zip
          generate_release_notes: true
